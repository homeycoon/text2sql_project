<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text2SQL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            padding-bottom: 15px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }

        textarea::placeholder {
            color: #999;
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 200px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        button:focus:not(:active)::after {
            animation: ripple 1s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(20, 20);
                opacity: 0;
            }
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .info-text i {
            font-style: normal;
            color: #667eea;
            font-weight: 600;
        }

        /* Анимация для появления формы */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: slideUp 0.6s ease-out;
        }

        /* Стили для подсветки синтаксиса (опционально) */
        .sql-hint {
            background: #f0f4f8;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
            border-left: 3px solid #667eea;
        }

        .sql-hint code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #764ba2;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            button {
                padding: 12px 20px;
                font-size: 16px;
            }

            .button-group {
                flex-direction: column;
                align-items: center;
            }

            button {
                max-width: 100%;
                width: 100%;
            }
        }

        /* Стили для статуса отправки */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Улучшенный фокус для доступности */
        button:focus-visible,
        textarea:focus-visible {
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Сервис запроса статистики из БД</h1>

        <form action="/start_graph" method="post">
            <div class="form-group">
                <label for="user_request">📝 Ваш запрос на естественном языке:</label>
                <textarea
                    id="user_request"
                    name="user_request"
                    rows="5"
                    required
                    placeholder="Например: Покажи всех сотрудников отдела IT старше 30 лет"
                ></textarea>
            </div>

            <div class="sql-hint">
                <i>💡 Подсказка:</i> Вы можете спрашивать на русском языке о данных в базе.
                Например: <code>"сколько сотрудников работает в каждом отделе"</code> или
                <code>"найди проекты с бюджетом больше 1 миллиона"</code>
            </div>

            <div class="button-group">
                <button type="submit" id="submitBtn">
                    <span>🚀 Отправить</span>
                </button>
                <button type="reset" onclick="document.getElementById('user_request').value=''">
                    <span>🗑️ Очистить</span>
                </button>
            </div>
        </form>

        <div class="info-text">
            <i>⚡</i> Быстрый доступ к данным через естественный язык
        </div>
    </div>

    <script>
        // Добавляем эффект загрузки при отправке формы
        document.querySelector('form').addEventListener('submit', function(e) {
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span>Отправка...</span><span class="loading"></span>';
            submitBtn.disabled = true;

            // Форма отправится normally, но мы можем добавить таймаут для возврата кнопки в случае ошибки
            setTimeout(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }, 5000);
        });
    </script>
</body>
</html>
